<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>진해용원고등학교 수학여행 가이드앱</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root{
      --jeju-sky:#eef8ff;
      --jeju-ocean:#d8f1f5;
      --jeju-sand:#fff7e8;
      --jeju-mint:#dff7ec;
      --jeju-stone:#5c6b73;
      --jeju-accent:#2b7a78;
      --jeju-soft:#5b8ca8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      -webkit-tap-highlight-color: transparent;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.92) 0 10%, transparent 11% 100%),
        radial-gradient(circle at 82% 14%, rgba(255,255,255,0.72) 0 8%, transparent 9% 100%),
        linear-gradient(180deg, #dff3ff 0%, #eef9ff 22%, #def4f0 50%, #f8fbff 100%);
      position: relative;
      overflow-x: hidden;
    }
    body::before{
      content:'';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at bottom, rgba(67, 172, 181, 0.16), transparent 58%) bottom/100% 42% no-repeat,
        radial-gradient(ellipse at bottom left, rgba(232, 184, 97, 0.14), transparent 35%) bottom left/52% 22% no-repeat,
        radial-gradient(ellipse at bottom right, rgba(74, 114, 126, 0.12), transparent 38%) bottom right/45% 16% no-repeat;
      opacity: .95;
    }
    body::after{
      content:'🍊  🍊  🍊';
      position: fixed;
      right: 14px;
      top: 18px;
      font-size: 22px;
      letter-spacing: 14px;
      opacity: .14;
      transform: rotate(-10deg);
      pointer-events: none;
      filter: saturate(1.05);
    }
    .h-screen-safe { height: 100vh; height: -webkit-fill-available; }
    .app-shell{
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.65);
      box-shadow: 0 24px 60px rgba(41,88,113,.16);
    }
    .hero-header{
      position: relative;
      overflow: hidden;
      color: #0f3d56;
      background:
        linear-gradient(145deg, rgba(255,255,255,.90), rgba(239,252,255,.82)),
        linear-gradient(180deg, #dbf5ff, #f7fffd);
    }
    .hero-header::before{
      content:'';
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.76), rgba(255,255,255,.86)),
        url("https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Seongsan_Ilchulbong_from_the_air.jpg/1280px-Seongsan_Ilchulbong_from_the_air.jpg") center/cover no-repeat;
      opacity:.18;
      filter:saturate(1.02);
    }
    .hero-header::after{
      content:'';
      position:absolute;
      left:-8%;
      right:-8%;
      bottom:-58px;
      height:110px;
      border-radius:50%;
      background: linear-gradient(180deg, rgba(106,205,214,.22), rgba(255,255,255,0));
    }
    .jeju-badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color:#24556d;
      background: rgba(255,255,255,.72);
      border:1px solid rgba(92,174,189,.25);
      box-shadow: 0 6px 18px rgba(88, 155, 173, .10);
    }
    .main-surface{
      background: linear-gradient(180deg, rgba(248,253,255,.74), rgba(252,255,254,.88));
    }
    .bottom-nav{
      background: rgba(255,255,255,.86);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(148, 193, 208, .28);
    }
.trip-subtitle{
      color:#4f7b8f;
      font-size: 13px;
      font-weight: 600;
    }

                  const [studentName, choices] = args;
                  Object.keys(mockDataStore.mealChoices).forEach(mealId => {
                    if (mockDataStore.mealChoices[mealId][studentName]) {
                      delete mockDataStore.mealChoices[mealId][studentName];
                    }
                  });
                  Object.keys(choices).forEach(mealId => {
                    if (!mockDataStore.mealChoices[mealId]) mockDataStore.mealChoices[mealId] = {};
                    mockDataStore.mealChoices[mealId][studentName] = choices[mealId];
                  });
                  result = JSON.parse(JSON.stringify(mockDataStore));
                  break;
                }


                case 'updateTeacherName': {
                  const [previousName, newName] = args;
                  const safeName = String(newName || '').trim();
                  if (!safeName) {
                    result = JSON.parse(JSON.stringify(mockDataStore));
                    break;
                  }
                  mockDataStore.teachers = (mockDataStore.teachers || []).map(teacher =>
                    teacher.name === previousName ? { ...teacher, name: safeName } : teacher
                  );
                  Object.keys(mockDataStore.busTeachers || {}).forEach(busKey => {
                    if (mockDataStore.busTeachers[busKey] === previousName) {
                      mockDataStore.busTeachers[busKey] = safeName;
                    }
                  });
                  Object.keys(mockDataStore.roomData || {}).forEach(roomKey => {
                    const room = mockDataStore.roomData[roomKey];
                    if (room && Array.isArray(room.members)) {
                      room.members = room.members.map(member => member === previousName ? safeName : member);
                    }
                  });
                  result = JSON.parse(JSON.stringify(mockDataStore));
                  break;
                }

                case 'updateTeacherContact': {
                  const [teacherName, contact] = args;
                  mockDataStore.teachers = (mockDataStore.teachers || []).map(teacher =>
                    teacher.name === teacherName ? { ...teacher, contact: String(contact || '') } : teacher
                  );
                  result = JSON.parse(JSON.stringify(mockDataStore));
                  break;
                }

                case 'updateStudentActivity': {
                  const [studentName, newActivityKey] = args;
                  Object.keys(mockDataStore.activities).forEach(k => {
                    mockDataStore.activities[k] = (mockDataStore.activities[k] || []).filter(n => n !== studentName);
                  });
                  if (newActivityKey && newActivityKey !== 'none') {
                    if (!mockDataStore.activities[newActivityKey]) mockDataStore.activities[newActivityKey] = [];
                    if (!mockDataStore.activities[newActivityKey].includes(studentName)) {
                      mockDataStore.activities[newActivityKey].push(studentName);
                    }
                  }
                  result = JSON.parse(JSON.stringify(mockDataStore));
                  break;
                }

                // ✅ 숙소 배정: 특정 사람을 특정 방에 배정(기존 배정은 제거)
                case 'setRoomAssignment': {
                  const [personName, roomNum, roomType] = args;

                  // 1) 기존 배정 제거
                  mockDataStore.roomData = (mockDataStore.roomData || []).filter(row => row[2] !== personName);

                  // 2) 새 배정 추가 (roomNum, roomType, personName)
                  if (personName && roomNum && roomType) {
                    mockDataStore.roomData.push([String(roomNum), String(roomType), String(personName)]);
                  }

                  result = JSON.parse(JSON.stringify(mockDataStore));
                  break;
                }

                // ✅ 숙소 배정 삭제
                case 'removeRoomAssignment': {
                  const [personName] = args;
                  mockDataStore.roomData = (mockDataStore.roomData || []).filter(row => row[2] !== personName);
                  result = JSON.parse(JSON.stringify(mockDataStore));
                  break;
                }

                // ✅ 방 타입 변경(해당 방 전체)
                case 'setRoomType': {
                  const [roomNum, roomType] = args;
                  mockDataStore.roomData = (mockDataStore.roomData || []).map(row => {
                    if (String(row[0]) === String(roomNum)) return [String(roomNum), String(roomType), row[2]];
                    return row;
                  });
                  result = JSON.parse(JSON.stringify(mockDataStore));
                  break;
                }

                case 'saveSubscription':
                  console.log('Saved subscription:', args[0]);
                  result = { success: true };
                  break;

                default:
                  throw new Error(`Mock for ${functionName} not implemented.`);
              }
              resolve(result);
            } catch (e) {
              console.error(`Mock function for ${functionName} failed:`, e);
              resolve({ error: true, message: e.message });
            }
          }, 250);
        });
      }

      // PROD (Apps Script)
      return new Promise((resolve, reject) => {
        window.google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          [functionName](...args);
      });
    };

    const googleScript = {

      saveSubscription: (subscription) => runAsync('saveSubscription', subscription),
      updateTeacherName: (previousName, newName) => runAsync('updateTeacherName', previousName, newName),
      updateTeacherContact: (teacherName, contact) => runAsync('updateTeacherContact', teacherName, contact),

      updateStudentActivity: (studentName, activityKey) => runAsync('updateStudentActivity', studentName, activityKey),

      setRoomAssignment: (personName, roomNum, roomType) => runAsync('setRoomAssignment', personName, roomNum, roomType),

                    </li>
                  ))}
                </ul>
              </div>

          <div className="bg-white p-3 rounded-xl shadow-lg">

            <div className="flex gap-2">
              <button
                className={`w-full py-2 rounded-lg font-bold border ${mode === 'list' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-700 border-gray-200'}`}
                onClick={() => setMode('list')}

            onUpdate(googleScript.updateBusSeat(busNumber, seat, ''));
          }
        } else {
          setSelectedSeat(seat);
          setIsModalOpen(true);
        }
      };

      const handleSelectStudent = async (studentName) => {
        setIsModalOpen(false);
        if (!studentName) return;
        await onUpdate(googleScript.updateBusSeat(busNumber, selectedSeat, studentName));
      };

      const openResetModal = (busNum) => {
        setBusToReset(busNum);
        setPassword('');
        setError('');
        setIsResetModalOpen(true);
      };

      const handlePasswordAndReset = async (e) => {
        e.preventDefault();
        if (password !== TEACHER_PASSWORD) {
          setError('비밀번호가 일치하지 않습니다.');
          return;
        }
        setIsResetModalOpen(false);
        if (confirm(`${busToReset}호차 탑승 정보를 초기화하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) {
          await onUpdate(googleScript.resetBus(busToReset));
        }
        setPassword('');
        setError('');
        setBusToReset(null);
      };

      const StudentSelectModal = () => {
        const [searchTerm, setSearchTerm] = useState('');
        const filteredStudents = useMemo(() => {
          const availableStudents = unboardedStudents.filter(student => {
            const assignedBus = assignedBusByStudent.get(student);
            return !assignedBus || assignedBus === busNumber;
          });
          if (!searchTerm.trim()) return availableStudents.slice().sort(compareTripNames);
          const t = searchTerm.toLowerCase().trim();
          return availableStudents.filter(s => s.toLowerCase().includes(t)).sort(compareTripNames);
        }, [searchTerm, unboardedStudents, assignedBusByStudent, busNumber]);

        return (
          <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={`${busNumber}호차 ${selectedSeat}번 좌석 배정`}>
            <div className="flex flex-col space-y-4">
              <input
                type="text"
                placeholder="이름 또는 학번으로 검색"
                className="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
                value={searchTerm}
                onChange={e => setSearchTerm(e.target.value)}
                autoFocus
              />
              <div className="max-h-64 overflow-y-auto border rounded-lg bg-gray-50">
                {filteredStudents.length > 0 ? (
                  <ul className="divide-y divide-gray-200">
                    {filteredStudents.map(student => (
                      <li key={student} className="p-3 hover:bg-blue-100 cursor-pointer transition-colors duration-150" onClick={() => handleSelectStudent(student)}>
                        {student}
                      </li>
                    ))}
                  </ul>
                ) : (
                  <p className="p-4 text-center text-gray-500">검색 결과가 없습니다.</p>
                )}
              </div>
            </div>
          </Modal>
        );
      };

      return (
        <div className="p-4">
          <Modal isOpen={isResetModalOpen} onClose={() => setIsResetModalOpen(false)} title={`${busToReset}호차 초기화 인증`}>
            <form onSubmit={handlePasswordAndReset}>
              <p className="mb-4 text-gray-600">교사용 비밀번호를 입력하여 초기화를 승인하세요.</p>
              <input
                type="password"
                placeholder="비밀번호"
                className="w-full p-2 border rounded-md"
                value={password}
                onChange={e => setPassword(e.target.value)}
              />
              {error && <p className="text-red-500 text-sm mt-2">{error}</p>}
              <button type="submit" className="w-full mt-4 bg-red-500 text-white font-bold py-2 px-4 rounded-md">초기화 승인</button>
            </form>
          </Modal>

          {isModalOpen && <StudentSelectModal />}

          <div className="grid grid-cols-5 border-b mb-4 bg-white rounded-t-lg overflow-hidden">
            {busNumbers.map(num => (
              <button
                key={num}
                onClick={() => setBusNumber(String(num))}
                className={`py-3 px-2 text-sm sm:text-base font-bold w-full ${busNumber == num ? 'text-blue-600 border-b-4 border-blue-600 bg-blue-50' : 'text-gray-500 bg-white'}`}
              >
                {num}호차
              </button>
            ))}
          </div>

          <div className="bg-blue-50 border border-blue-200 p-3 rounded-lg shadow-sm mb-4 space-y-1">
            <p className="font-bold text-blue-700">{busNumber}호차 탑승 대상: {busNumber}반</p>
            <p className="text-sm text-gray-700">담당 교사: <span className="font-bold">{BUS_TEACHER_MAP[busNumber] || '미정'}</span></p>
          </div>
          <div className="bg-white p-4 rounded-lg shadow-md mb-4">
            <div className="bg-gray-200 rounded-lg p-2 grid grid-cols-5 gap-2 w-max mx-auto text-xs text-center">
              <div className="col-span-2 bg-gray-600 text-white rounded p-2 flex items-center justify-center">운전석</div>
              <div className="col-span-1"></div>
              <div className="col-span-2 bg-gray-400 text-white rounded p-2 flex items-center justify-center">입구</div>

              {Array.from({ length: 45 }, (_, i) => i + 1).map(seat => {
                const student = data.busData[busNumber]?.[seat];
                const isOccupied = !!student;
                const styleIndex = seat;
                const gridCol = styleIndex <= 40 ? ((((styleIndex - 1) % 4) < 2) ? (((styleIndex - 1) % 4) + 1) : (((styleIndex - 1) % 4) + 2)) : (styleIndex - 40);
                const gridRow = styleIndex > 40 ? 12 : Math.floor((styleIndex - 1) / 4) + 2;
                return (
                  <div
                    key={seat}
                    className={`h-10 rounded flex items-center justify-center font-bold transition-transform transform cursor-pointer hover:scale-110 ${isOccupied ? 'bg-green-600 text-white' : 'bg-gray-300'}`}
                    style={{ gridColumn: gridCol, gridRow: gridRow }}
                    onClick={() => handleSeatClick(seat)}
                  >
                    {isOccupied ? getSeatDisplayName(student) : seat}
                  </div>
                );
              })}
            </div>

            <button
              onClick={() => openResetModal(busNumber)}
              className="w-full mt-4 bg-red-500 text-white font-bold py-2 rounded-lg disabled:bg-gray-400"
              disabled={isLoading}
            >
              {isLoading ? '초기화 중...' : '초기화'}
            </button>
          </div>

          <div className="bg-white p-4 rounded-lg shadow-md">
            <h3 className="font-bold mb-2">{busNumber}반 미탑승 학생 ({unboardedStudents.length}명)</h3>
            <div className="max-h-40 overflow-y-auto text-sm flex flex-wrap gap-2">
              {unboardedStudents.slice().sort(compareTripNames).map(s => <span key={s} className="bg-yellow-100 px-2 py-1 rounded">{s}</span>)}
            </div>
          </div>
        </div>
      );
    };

        {

          ],
        },
        {
          category: '각종 사고 발생 시 대응 요령',
          rules: [
            '사고 발생 시 당황하지 말고 즉시 가까운 교사나 인솔자에게 알립니다.',
            '길을 잃었을 경우 함부로 이동하지 말고 현재 위치에서 연락을 기다립니다.',
            '화재 발생 시 엘리베이터를 사용하지 않고 비상계단을 이용하여 대피합니다.',
            '응급환자 발생 시 함부로 옮기지 말고 주변에 도움을 요청한 뒤 교사에게 알립니다.',
            '교통사고나 안전사고 발생 시 현장을 벗어나지 말고 교사의 지시에 따릅니다.',

            '몸이 아프거나 위험 상황을 목격한 경우 혼자 해결하려 하지 말고 즉시 도움을 요청합니다.',
          ],
        },
      ];

      return (
        <div className="p-4 space-y-4">
          <div className="bg-white p-5 rounded-2xl shadow-lg">
            <h2 className="text-2xl font-bold text-center text-red-600 mb-2">🛟 안전수칙</h2>
            <p className="text-sm text-gray-600 text-center">
              수학여행 기간 동안 모두의 안전을 위해 반드시 확인해야 할 안전수칙입니다.
            </p>
          </div>

          {safetyRules.map((section, index) => (
            <div key={index} className="bg-white p-5 rounded-2xl shadow-md">
              <h3 className="text-lg font-bold text-gray-800 mb-3">{section.category}</h3>
              <ul className="space-y-2">
                {section.rules.map((rule, idx) => (
                  <li key={idx} className="flex items-start gap-2 text-gray-700 leading-relaxed">
                    <span className="text-red-500 font-bold mt-0.5">•</span>
                    <span>{rule}</span>
                  </li>
                ))}
              </ul>

          ))}

          <div className="bg-yellow-50 border border-yellow-200 p-4 rounded-2xl">
            <h3 className="font-bold text-yellow-800 mb-2">비상시 행동 원칙</h3>
            <p className="text-sm text-yellow-900 leading-relaxed">
              위급한 상황이 발생하면 혼자 판단하여 행동하지 말고, 현재 위치를 안전하게 확보한 뒤
              즉시 담임교사 또는 인솔교사에게 연락하세요.
            </p>
          </div>
        </div>
      );
    };


    const AllStudentsView = ({ students, busData, activities }) => {
      const [search, setSearch] = useState('');

      const busByStudent = useMemo(() => {
        const map = new Map();
        Object.entries(busData || {}).forEach(([busNum, seats]) => {
          Object.values(seats || {}).forEach(student => {
            if (student) map.set(student, `${busNum}호차`);
          });
        });
        return map;
      }, [busData]);

      const activityByStudent = useMemo(() => {
        const map = new Map();
        (activities?.day1_kbs || []).forEach(name => map.set(name, 'KBS'));
        (activities?.day1_museum || []).forEach(name => map.set(name, '국립중앙박물관'));
        (activities?.day2_sky || []).forEach(name => map.set(name, '서울스카이'));
        return map;
      }, [activities]);

      const filteredStudents = useMemo(() => {
        const sorted = (students || []).slice().sort(compareTripNames);
        const q = search.trim().toLowerCase();
        if (!q) return sorted;
        return sorted.filter(student => student.toLowerCase().includes(q));
      }, [students, search]);

      return (
        <div className="p-4 space-y-4">
          <div className="bg-white p-4 rounded-xl shadow-lg">
            <h2 className="text-2xl font-bold text-center mb-3">전체 학생</h2>
            <input
              type="text"
              className="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
              placeholder="이름, 반, 번호로 검색"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
            />
            <p className="text-xs text-gray-500 mt-2">총 {students?.length || 0}명</p>
          </div>

          <div className="bg-white rounded-xl shadow-lg overflow-hidden">
            <div className="max-h-[65vh] overflow-y-auto divide-y divide-gray-100">
              {filteredStudents.length > 0 ? filteredStudents.map(student => {
                const bus = busByStudent.get(student) || '미탑승';
                const activity = activityByStudent.get(student) || '미지정';
                return (
                  <div key={student} className="p-4 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                      <p className="font-semibold text-gray-800">{student}</p>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      <span className={`text-xs px-2 py-1 rounded-full font-bold ${bus === '미탑승' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-700'}`}>
                        버스 {bus}
                      </span>
                      <span className={`text-xs px-2 py-1 rounded-full font-bold ${activity === '미지정' ? 'bg-gray-100 text-gray-600' : 'bg-blue-100 text-blue-700'}`}>
                        활동 {activity}
                      </span>
                    </div>
                  </div>

              }) : (
                <p className="p-8 text-center text-gray-500">검색 결과가 없습니다.</p>
              )}
            </div>
          </div>
        </div>
      );
    };

    const ActivityMissionView = ({ activities, missions, data, onUpdate, isLoading }) => {
      const missionsByDay = useMemo(() => {
        const groups = {};
        if (missions) {
          missions.forEach(([day, place, content]) => {
            if (!groups[day]) groups[day] = [];
            groups[day].push({ place, content });
          });
        }
        return groups;
      }, [missions]);

      const day2_981_list = activities?.day2_981 || [];
      const day2_cheonjiyeon_list = activities?.day2_cheonjiyeon || [];
      const day3_aqua_list = activities?.day3_aqua || [];
      const day3_bijarim_list = activities?.day3_bijarim || [];

      const TEACHER_PASSWORD = "123456";
      const [isUnlocked, setIsUnlocked] = useState(false);
      const [pw, setPw] = useState('');
      const [pwErr, setPwErr] = useState('');

      const [search, setSearch] = useState('');
      const [selectedStudent, setSelectedStudent] = useState(null);

      const filteredStudents = useMemo(() => {
        const list = (data?.students || []).slice().sort(compareTripNames);
        if (!search.trim()) return list;
        const t = search.toLowerCase().trim();
        return list.filter(s => s.toLowerCase().includes(t));
      }, [search, data?.students]);

      const currentActivityLabel = useMemo(() => {
        if (!selectedStudent || !activities) return '없음';
        if ((activities.day2_981 || []).includes(selectedStudent)) return '2일차 981 Park (Racing, Survival)';
        if ((activities.day2_cheonjiyeon || []).includes(selectedStudent)) return '2일차 천지연 폭포';
        if ((activities.day3_aqua || []).includes(selectedStudent)) return '3일차 아쿠아플라넷';
        if ((activities.day3_bijarim || []).includes(selectedStudent)) return '3일차 비자림';
        return '없음';
      }, [selectedStudent, activities]);

      const unlock = (e) => {
        e.preventDefault();
        if (pw === TEACHER_PASSWORD) {
          setIsUnlocked(true);
          setPw('');
          setPwErr('');
        } else {
          setPwErr('비밀번호가 일치하지 않습니다.');
        }
      };

      const activityButtons = [
        { key: 'day2_981', label: '2일차 981 Park' },
        { key: 'day2_cheonjiyeon', label: '2일차 천지연 폭포' },
        { key: 'day3_aqua', label: '3일차 아쿠아플라넷' },
        { key: 'day3_bijarim', label: '3일차 비자림' },
        { key: 'none', label: '없음' },
      ];

      const setActivity = async (activityKey) => {
        if (!selectedStudent) return;
        await onUpdate(googleScript.updateStudentActivity(selectedStudent, activityKey));
      };

      return (
        <div className="p-4 space-y-8">
          <div className="bg-white p-4 rounded-xl shadow-lg">
            <div className="flex items-center justify-between">
              <h2 className="text-xl font-bold text-gray-800">🎛️ 제주 선택활동 지정(교사용)</h2>
              {!isUnlocked ? (
                <span className="text-xs text-gray-500">잠금 상태</span>
              ) : (
                <span className="text-xs text-green-600 font-bold">잠금 해제됨</span>
              )}
            </div>

            {!isUnlocked ? (
              <form onSubmit={unlock} className="mt-4 space-y-2">
                <input
                  type="password"
                  className="w-full p-2 border rounded-md"
                  placeholder="비밀번호"
                  value={pw}
                  onChange={e => setPw(e.target.value)}
                />
                {pwErr && <p className="text-red-500 text-sm">{pwErr}</p>}
                <button className="w-full bg-blue-500 text-white font-bold py-2 rounded-md">확인</button>
              </form>
            ) : (
              <div className="mt-4 space-y-3">
                <input
                  className="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
                  placeholder="학생 검색(이름/반/번호)"
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                />

                <div className="max-h-40 overflow-y-auto border rounded-lg bg-gray-50">
                  <ul className="divide-y divide-gray-200">
                    {filteredStudents.map(s => (
                      <li
                        key={s}
                        onClick={() => setSelectedStudent(s)}
                        className={`p-3 cursor-pointer transition-colors ${
                          selectedStudent === s ? 'bg-blue-100 font-bold' : 'hover:bg-gray-100'
                        }`}
                      >
                        {s}
                      </li>
                    ))}
                  </ul>
                </div>

                <div className="bg-white border rounded-lg p-3">
                  <p className="text-sm text-gray-700">
                    선택 학생: <span className="font-bold text-blue-600">{selectedStudent || '없음'}</span>
                  </p>
                  <p className="text-sm text-gray-700 mt-1">
                    현재 활동: <span className="font-bold text-indigo-600">{currentActivityLabel}</span>
                  </p>

                  <div className="grid grid-cols-2 gap-2 mt-3">
                    {activityButtons.map(b => (
                      <button
                        key={b.key}
                        type="button"
                        disabled={!selectedStudent || isLoading}
                        onClick={() => setActivity(b.key)}
                        className={`py-2 rounded-lg border-2 font-bold transition-all
                          ${!selectedStudent ? 'bg-gray-100 text-gray-400 border-gray-200' : 'bg-white text-blue-600 border-blue-500 hover:bg-blue-50'}
                        `}
                      >
                        {b.label}
                      </button>
                    ))}
                  </div>

                  <p className="text-xs text-gray-500 mt-2">
                    ※ 여기서 지정하면 “전체학생” 탭의 파란 라벨이 자동으로 바뀝니다.
                  </p>
                </div>
              </div>
            )}
          </div>

          <div>
            <h2 className="text-2xl font-bold text-center mb-6">🏆 제주 미션</h2>
            {['1일차', '2일차', '3일차'].map(day => (
              missionsByDay[day] && (
                <div key={day} className="mb-6">
                  <h3 className="text-xl font-bold text-blue-600 border-l-4 border-blue-600 pl-3 mb-4">{day}</h3>
                  <div className="space-y-3">
                    {missionsByDay[day].map((m, i) => (
                      <div key={i} className="bg-white p-4 rounded-lg shadow-sm">
                        <p className="font-semibold text-gray-600">{m.place}</p>
                        <p className="mt-1 text-gray-800">{m.content}</p>
                      </div>
                    ))}
                  </div>
                </div>
              )
            ))}
          </div>

          <div>
            <h2 className="text-2xl font-bold text-center mb-6">✨ 선택 활동</h2>
            <div className="space-y-4 max-w-2xl mx-auto">
              <div className="bg-white p-4 rounded-lg shadow">
                <h3 className="font-bold mb-2">2일차 981 Park (Racing, Survival) ({day2_981_list.length}명)</h3>
                <ul className="text-sm flex flex-wrap gap-2">
                  {day2_981_list.slice().sort(compareTripNames).map(s => <li key={s} className="bg-gray-100 px-2 py-1 rounded">{s}</li>)}
                </ul>
              </div>

              <div className="bg-white p-4 rounded-lg shadow">
                <h3 className="font-bold mb-2">2일차 천지연 폭포 ({day2_cheonjiyeon_list.length}명)</h3>
                <ul className="text-sm flex flex-wrap gap-2">
                  {day2_cheonjiyeon_list.slice().sort(compareTripNames).map(s => <li key={s} className="bg-gray-100 px-2 py-1 rounded">{s}</li>)}
                </ul>
              </div>

              <div className="bg-white p-4 rounded-lg shadow">
                <h3 className="font-bold mb-2">3일차 아쿠아플라넷 ({day3_aqua_list.length}명)</h3>
                <ul className="text-sm flex flex-wrap gap-2">
                  {day3_aqua_list.slice().sort(compareTripNames).map(s => <li key={s} className="bg-gray-100 px-2 py-1 rounded">{s}</li>)}
                </ul>
              </div>

              <div className="bg-white p-4 rounded-lg shadow">
                <h3 className="font-bold mb-2">3일차 비자림 ({day3_bijarim_list.length}명)</h3>
                <ul className="text-sm flex flex-wrap gap-2">
                  {day3_bijarim_list.slice().sort(compareTripNames).map(s => <li key={s} className="bg-gray-100 px-2 py-1 rounded">{s}</li>)}
                </ul>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const ContestView = () => {
      const [tab, setTab] = useState('poster');
      const padletUrl = "https://padlet.com/sky3yellow4/2026-2-5-12-5-15-rfzf5ga5yxu9a4lx";
      const posterTips = [
        '수학여행 일정 중 방문한 제주 장소 1곳을 골라 홍보 포토 포스터를 제작합니다.',
        '자신 또는 친구들의 사진이 반드시 포함되도록 합니다.',
        '미리캔버스 또는 캔바로 2매 이내, 자유 형식으로 제작합니다.',
        '짧고 선명한 홍보 문구와 제주 분위기가 드러나는 사진을 함께 담아보세요.'
      ];
      const reviewTips = [
        '제주의 문화적 환경',
        '제주 관광문화와 홍보 전략',
        '체험 기구의 과학적 작동 원리',
        '수학여행을 통해 느낀 점과 앞으로의 나의 모습'
      ];

      return (
        <div className="p-4 space-y-4">
          <div className="bg-white/90 rounded-3xl shadow-lg p-5 border border-sky-100">
            <div className="flex items-center justify-between gap-3 mb-3">
              <div>
                <h2 className="text-xl font-extrabold text-sky-900">🏆 수학여행 공모전</h2>
                <p className="text-sm text-slate-600 mt-1">홍보 포토 포스터와 소감문 작성으로 제주 수학여행을 기록해 보세요.</p>
              </div>
              <span className="jeju-badge">제출 5/31</span>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <div className="rounded-2xl bg-orange-50 border border-orange-100 p-3">
                <div className="text-xs text-orange-500 font-semibold mb-1">참여 대상</div>
                <div className="text-sm font-bold text-slate-700">수학여행 참여 학생</div>
              </div>
              <div className="rounded-2xl bg-teal-50 border border-teal-100 p-3">
                <div className="text-xs text-teal-500 font-semibold mb-1">결과 발표</div>
                <div className="text-sm font-bold text-slate-700">6/2 화요일</div>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-2xl shadow p-2 flex gap-2 sticky top-0 z-10">
            <button className={`flex-1 py-2.5 rounded-xl text-sm font-semibold ${tab === 'poster' ? 'bg-orange-500 text-white' : 'bg-gray-100 text-gray-700'}`} onClick={() => setTab('poster')}>포토 포스터</button>
            <button className={`flex-1 py-2.5 rounded-xl text-sm font-semibold ${tab === 'review' ? 'bg-teal-600 text-white' : 'bg-gray-100 text-gray-700'}`} onClick={() => setTab('review')}>소감문</button>
          </div>

          {tab === 'poster' ? (
            <div className="space-y-4">
              <div className="rounded-3xl overflow-hidden border border-orange-100 bg-gradient-to-br from-[#fff7ec] via-white to-[#eefaf8] shadow">
                <div className="p-5">
                  <div className="text-xs font-semibold text-orange-500 mb-2">홍보 포토 포스터 제작</div>
                  <h3 className="text-xl font-extrabold text-slate-800 leading-snug">제주의 한 장소를 골라 친구들과 함께 홍보 포스터 만들기</h3>
                  <p className="text-sm text-slate-600 mt-3">방문 장소 1곳을 선택해 사진과 홍보 문구를 담은 포스터를 만들어 제출합니다.</p>
                </div>
              </div>
              <div className="bg-white rounded-3xl shadow p-5 border border-orange-100">
                <h4 className="font-bold text-slate-800 mb-3">제작 기준</h4>
                <ul className="space-y-2">
                  {posterTips.map((tip, i) => (
                    <li key={i} className="flex gap-2 text-sm text-slate-700 leading-relaxed"><span className="text-orange-500 font-bold">•</span><span>{tip}</span></li>
                  ))}
                </ul>
              </div>
              <div className="bg-white rounded-3xl shadow p-5 border border-sky-100">
                <h4 className="font-bold text-slate-800">패들렛 업로드</h4>
                <p className="text-sm text-slate-600 mt-1">완성한 포스터는 아래 버튼을 눌러 패들렛에 업로드하세요.</p>
                <a href={padletUrl} target="_blank" rel="noreferrer" className="mt-4 inline-flex w-full items-center justify-center rounded-2xl bg-sky-600 text-white font-bold py-3 px-4 shadow hover:bg-sky-700">패들렛 바로가기</a>
              </div>
            </div>
          ) : (
            <div className="space-y-4">
              <div className="bg-white rounded-3xl shadow p-5 border border-teal-100">
                <div className="text-xs font-semibold text-teal-500 mb-2">소감문 작성</div>
                <h3 className="text-xl font-extrabold text-slate-800 leading-snug">체험학습을 다녀와서 나만의 생각과 배움을 정리해 보기</h3>
                <p className="text-sm text-slate-600 mt-3">제주에서 보고 느낀 점을 정리해 한 편의 소감문으로 제출합니다.</p>
              </div>
              <div className="bg-white rounded-3xl shadow p-5 border border-teal-100">
                <h4 className="font-bold text-slate-800 mb-3">이런 내용을 써 보세요</h4>
                <ul className="space-y-2">
                  {reviewTips.map((tip, i) => (
                    <li key={i} className="flex gap-2 text-sm text-slate-700 leading-relaxed"><span className="text-teal-500 font-bold">•</span><span>{tip}</span></li>
                  ))}
                </ul>
              </div>
              <div className="bg-white rounded-3xl shadow p-5 border border-slate-200">
                <h4 className="font-bold text-slate-800 mb-3">작성 안내</h4>
                <div className="space-y-2 text-sm text-slate-700">
                  <div className="rounded-2xl bg-slate-50 p-3">일시: 2026. 5. 12. 화 ~ 5. 15. 금, 3박 4일</div>
                  <div className="rounded-2xl bg-slate-50 p-3">학번과 이름을 정확히 적고, 여행에서 느낀 점이 잘 드러나게 작성합니다.</div>
                </div>
              </div>
            </div>
          )}

          <div className="bg-yellow-50 border border-yellow-200 rounded-2xl p-4 text-sm text-yellow-900">시상은 포토 포스터 6명, 소감문 5명 규모로 운영됩니다.</div>
        </div>
      );
    };

    // =========================
    // 7) Main App
    // =========================
    const App = () => {
      const [view, setView] = useState('announcement');
      const [data, setData] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [error, setError] = useState(null);
      const [lastUpdated, setLastUpdated] = useState(null);

      const CACHE_KEY = 'schoolTripData_v3';

      const updateStateAndCache = (newData) => {
        const ts = new Date();
        setData(newData);
        setLastUpdated(ts);
        try {
          localStorage.setItem(CACHE_KEY, JSON.stringify({ data: newData, timestamp: ts.toISOString() }));
        } catch (e) {
          console.error('cache write failed', e);
        }
      };

      const registerServiceWorker = () => {
        if ('serviceWorker' in navigator) {
          const scriptUrl = new URL(location.href);
          scriptUrl.searchParams.set('path', 'sw.js');
          navigator.serviceWorker.register(scriptUrl.href)
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW failed:', err));
        }
      };

      useEffect(() => {
        if (!isDevelopment) registerServiceWorker();

        const initLoad = async () => {
          let hasCache = false;
          try {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
              const { data: cachedData, timestamp } = JSON.parse(cached);
              setData(cachedData);
              setLastUpdated(new Date(timestamp));
              hasCache = true;
              setIsLoading(false);
            }
          } catch (e) {
            console.error('cache load failed', e);
            localStorage.removeItem(CACHE_KEY);
          }

          try {
            const result = await googleScript.getServerData();
            if (result?.error) throw new Error(result.message);
            updateStateAndCache(result);
            setError(null);
          } catch (e) {
            const msg = e.message || '데이터를 불러오는 데 실패했습니다.';
            if (!hasCache) setError(msg);
            else console.error('Background fetch failed:', msg);
          } finally {
            setIsLoading(false);
          }
        };

        initLoad();
      }, []);

      const handleMutation = async (mutationPromise) => {
        setIsLoading(true);
        const original = data;
        try {
          const newData = await mutationPromise;
          if (newData?.error) throw new Error(newData.message);
          updateStateAndCache(newData);
          setError(null);
        } catch (e) {
          setError('데이터 업데이트에 실패했습니다. 인터넷 연결을 확인해주세요.');
          setData(original);
        } finally {
          setIsLoading(false);
        }
      };

      const handleAddAnnouncement = async (text) => {
        setIsLoading(true);
        const original = data;
        try {
          const newAnnouncements = await googleScript.addAnnouncement(text);
          const updated = { ...data, announcements: newAnnouncements };
          updateStateAndCache(updated);
          setError(null);
        } catch (e) {
          setError('공지 등록에 실패했습니다. 인터넷 연결을 확인해주세요.');
          setData(original);
        } finally {
          setIsLoading(false);
        }
      };

      const renderView = () => {
        if (!data) return null;
        switch (view) {
          case 'announcement':
            return <AnnouncementsView announcements={data.announcements} onAdd={handleAddAnnouncement} isLoading={isLoading} />;
          case 'schedule':
            return <ScheduleInfoView teachers={data.teachers} onUpdate={handleMutation} isLoading={isLoading} />;
          case 'bus':
            return <BusView data={data} onUpdate={handleMutation} isLoading={isLoading} />;
          case 'room':
            return (
              <RoomsView
                roomData={data.roomData}
                teachers={data.teachers}
                students={data.students}
                onUpdate={handleMutation}
                isLoading={isLoading}
              />
            );
          case 'safety':
            return <SafetyRulesView />;
          case 'activity':
            return <ActivityMissionView activities={data.activities} missions={data.missions} data={data} onUpdate={handleMutation} isLoading={isLoading} />;
          case 'contest':
            return <ContestView />;
          case 'students':
            return <AllStudentsView students={data.students} busData={data.busData} activities={data.activities} />;
          default:
            return <AnnouncementsView announcements={data.announcements} onAdd={handleAddAnnouncement} isLoading={isLoading} />;
        }
      };

      if (isLoading && !data) return <LoadingSpinner message="수학여행 데이터를 불러오는 중..." />;

      if (error && !data) {
        return (
          <div className="p-8 text-center text-red-600 bg-red-50">
            <h2 className="text-xl font-bold mb-4">오류 발생</h2>
            <p>{error}</p>
            <p className="mt-4 text-sm text-gray-500">인터넷 연결을 확인하고 페이지를 새로고침 해주세요.</p>
          </div>
        );
      }

      const navItems = [
        { id: 'announcement', icon: <MegaphoneIcon />, label: '공지' },
        { id: 'schedule', icon: <ScheduleIcon />, label: '일정/정보' },
        { id: 'bus', icon: <BusIcon />, label: '버스' },
        { id: 'room', icon: <KeyIcon />, label: '숙소' },
        { id: 'safety', icon: <ShieldIcon />, label: '안전수칙' },
        { id: 'activity', icon: <StarIcon />, label: '미션/활동' },
        { id: 'contest', icon: <StarIcon />, label: '공모전' },
        { id: 'students', icon: <UsersIcon />, label: '전체학생' },
      ];

      return (
        <div className="max-w-lg mx-auto px-3 py-3 sm:py-5">
          <div className="app-shell rounded-[28px] overflow-hidden flex flex-col h-screen-safe">
            {error && data && (
              <div className="bg-amber-500/95 text-white text-center p-2 text-sm z-20 shrink-0">
                네트워크 연결 불안정. 오프라인 데이터 표시 중.
                {lastUpdated && ` (마지막 동기화: ${lastUpdated.toLocaleTimeString('ko-KR')})`}
              </div>
            )}

            {view === 'announcement' ? (
            <header className="hero-header shrink-0 px-5 pt-5 pb-6 border-b border-white/50">
              <div className="flex items-start justify-between gap-3 relative z-10">
                <div>
                  <div className="jeju-badge mb-3">🍊 제주도 3박 4일</div>
                  <h1 className="text-[1.72rem] leading-tight font-extrabold tracking-tight text-sky-900">
                    진해용원고 수학여행 가이드앱
                  </h1>
                  <p className="trip-subtitle mt-1">2026. 진해용원고등학교 2학년 수학여행 </p>
                  <div className="hero-deco-row">
                    <span className="tangerine-chip">🍊 감귤국</span>
                    <span className="tangerine-chip">🌅 삼다수 근원지</span>
                  </div>
                </div>
                <div className="text-4xl shrink-0 pt-1">🍊</div>
              </div>
              <div className="relative z-10 mt-4 grid grid-cols-2 gap-2">
                <div className="rounded-2xl bg-white/70 px-3 py-2 shadow-sm">
                  <div className="text-[11px] text-slate-500 font-semibold">수학여행 장소</div>
                  <div className="text-sm font-bold text-slate-700">제주도 일원</div>
                </div>
                <div className="rounded-2xl bg-white/70 px-3 py-2 shadow-sm">
                  <div className="text-[11px] text-slate-500 font-semibold">수학여행 일정</div>
                  <div className="text-sm font-bold text-slate-700">2026. 5. 12.(화) ~ 5. 15.(금)</div>
                </div>
              </div>
            </header>
            ) : (
            <header className="shrink-0 px-4 pt-4 pb-3 border-b border-white/50 bg-white/50 backdrop-blur-sm">
              <div className="flex items-center justify-between gap-3">
                <div>
                  <div className="text-[11px] font-semibold text-slate-500">진해용원고등학교 수학여행</div>
                  <div className="text-lg font-extrabold text-sky-900">{navItems.find(item => item.id === view)?.label || '안내'}</div>
                </div>
                <div className="jeju-badge">5/12~5/15</div>
              </div>
            </header>
            )}

            <main className="flex-grow overflow-y-auto main-surface">
              {renderView()}
            </main>

            <footer className="bottom-nav sticky bottom-0 shrink-0">
              <nav className="flex justify-around px-1">
                {navItems.map(item => (
                  <button
                    key={item.id}
                    onClick={() => setView(item.id)}
                    className={`flex flex-col items-center justify-center pt-2.5 pb-1.5 w-full transition-all duration-200 rounded-2xl mx-0.5 my-1 ${
                      view === item.id ? 'text-teal-700 bg-teal-50/90' : 'text-slate-500 hover:text-teal-700'
                    }`}
                  >
                    {React.cloneElement(item.icon, { className: 'w-7 h-7' })}
                    <span className="text-[11px] mt-1 font-semibold">{item.label}</span>
                  </button>
                ))}
              </nav>
            </footer>
          </div>
        </div>
      );
    };

    // =========================
    // 8) Render
    // =========================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <StrictMode>
        <App />
      </StrictMode>
    );
  </script>
</body>
</html>
